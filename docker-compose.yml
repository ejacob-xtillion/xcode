services:
  # Neo4j database for knowledge graphs (starts first)
  neo4j:
    image: neo4j:5.15
    container_name: xcode-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - xcode-network

  # PostgreSQL database for xCode Agent (optional - agent can run without it)
  postgres:
    image: postgres:15-alpine
    container_name: xcode-postgres
    environment:
      - POSTGRES_USER=xagents_user
      - POSTGRES_PASSWORD=xagents_password
      - POSTGRES_DB=xagents_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xagents_user -d xagents_db"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - xcode-network

  # LiteLLM AI Gateway (optional). Official image only; pin tag in this file.
  # Start: docker compose --profile litellm up -d
  # Agent: LLM_PROVIDER=litellm, LLM_BASE_URL=http://litellm:4000/v1, LLM_API_KEY=<same as LITELLM_MASTER_KEY>
  litellm:
    profiles: ["litellm"]
    image: ghcr.io/berriai/litellm:v1.82.3-stable.patch.2
    container_name: xcode-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    env_file:
      - path: ./.env
        required: true
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    command: ["--config=/app/config.yaml", "--port", "4000"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - xcode-network

  # xCode Agent API (integrated from la-factoria)
  xcode-agent:
    container_name: xcode-agent
    platform: linux/amd64
    restart: unless-stopped
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./agent:/app
      - /app/.venv
      - /Users/elijahgjacob:/Users/elijahgjacob
      # Same keys as compose env_file; keeps /app/.env aligned for tools that read CWD .env
      - ./.env:/app/.env:ro
    env_file:
      - path: ./.env
        required: true
    environment:
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - DATABASE_URL=postgresql://xagents_user:xagents_password@postgres:5432/xagents_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=xagents_user
      - POSTGRES_PASSWORD=xagents_password
      - POSTGRES_DB=xagents_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Single key: compose supplies LLM_API_KEY from OPENAI_API_KEY when LLM_API_KEY is unset
      - LLM_API_KEY=${LLM_API_KEY:-${OPENAI_API_KEY}}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4.1-mini}
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - xcode-network

  # xCode CLI service
  xcode:
    container_name: xcode-cli
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - /app/.venv
      - ~/.gitconfig:/root/.gitconfig:ro
      - /Users/elijahgjacob:/workspace:ro
    env_file:
      - path: ./.env
        required: true
    environment:
      - PYTHONUNBUFFERED=1
      - LA_FACTORIA_URL=http://xcode-agent:8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      xcode-agent:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - xcode-network
    stdin_open: true
    tty: true
    command: xcode -i --path /workspace/xcode

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:

networks:
  xcode-network:
    name: xcode-network
    driver: bridge
